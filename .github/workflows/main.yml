---
name: CI
on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
  # Reusable (called from the release.yml)
  workflow_call:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
        sqlalchemy-version: ['>=1.4,<2', '>=2,<3']
    steps:
      - uses: actions/checkout@v4
      - name: Setup PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pdm install
      - name: Pin SQLAlchemy to ${{ matrix.sqlalchemy-version }}
        # `pdm install` resolves to the latest SA; this step replaces it with
        # the matrix-selected range so we exercise both 1.4 and 2.x paths.
        # `--force-reinstall --no-deps` so pip will actually downgrade when
        # the existing install is newer.
        run: |
          pdm run python -m ensurepip --upgrade
          pdm run python -m pip install --force-reinstall --no-deps 'sqlalchemy${{ matrix.sqlalchemy-version }}'
      - name: Show installed SQLAlchemy
        run: pdm run python -c "import sqlalchemy; print(sqlalchemy.__version__)"
      - name: Lint (ruff check)
        run: pdm run ruff check ./src ./tests
      - name: Format check (ruff format)
        run: pdm run ruff format --check ./src ./tests
      - name: Type check (pyright)
        # Skip on SA 1.4: its type stubs are less complete than 2.x's and
        # flag genuine API differences (Optional returns, missing symbols)
        # that don't reflect real bugs in this code.
        if: matrix.sqlalchemy-version == '>=2,<3'
        run: pdm run pyright
      - name: Test Python code
        run: pdm run pytest
